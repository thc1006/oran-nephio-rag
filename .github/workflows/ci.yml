# O-RAN × Nephio RAG System - CI/CD Pipeline
# Focused workflow for the RAG system

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Test the system
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies for lxml
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2-dev libxslt1-dev zlib1g-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv requests beautifulsoup4 lxml
        pip install langchain langchain-community langchain-anthropic
        pip install sentence-transformers chromadb
        pip install pytest pytest-cov

    - name: Create test environment
      run: |
        echo "API_MODE=mock" > .env
        mkdir -p logs
        mkdir -p oran_nephio_vectordb
        mkdir -p embeddings_cache

    - name: Run basic import tests
      run: |
        python test_basic_imports.py

    - name: Create minimal database
      run: |
        python create_minimal_database.py

    - name: Run system tests
      run: |
        python test_final_system.py

    - name: Run system demo
      run: |
        python demo_system.py

    - name: Run verification
      run: |
        python verify_system.py

  # Build Docker image
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: oran-nephio-rag:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm -e API_MODE=mock oran-nephio-rag:latest python verify_system.py

  # Deploy documentation
  deploy-docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v3

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2